name: Check Upstream Bin Versions

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:       # Also allows you to trigger it manually from GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for updates
        id: check
        run: |
          CURRENT_PRESENTER=$(jq -r '.["minui-presenter"]' bin-versions.json)
          CURRENT_KEYBOARD=$(jq -r '.["minui-keyboard"]'   bin-versions.json)

          LATEST_PRESENTER=$(curl -s "https://api.github.com/repos/josegonzalez/minui-presenter/releases/latest" | jq -r '.tag_name')
          LATEST_KEYBOARD=$(curl -s  "https://api.github.com/repos/josegonzalez/minui-keyboard/releases/latest"  | jq -r '.tag_name')

          echo "current_presenter=$CURRENT_PRESENTER" >> $GITHUB_OUTPUT
          echo "current_keyboard=$CURRENT_KEYBOARD"   >> $GITHUB_OUTPUT
          echo "latest_presenter=$LATEST_PRESENTER"   >> $GITHUB_OUTPUT
          echo "latest_keyboard=$LATEST_KEYBOARD"     >> $GITHUB_OUTPUT

          if [ "$CURRENT_PRESENTER" != "$LATEST_PRESENTER" ] || [ "$CURRENT_KEYBOARD" != "$LATEST_KEYBOARD" ]; then
            echo "has_updates=true"  >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Update bin-versions.json
        if: steps.check.outputs.has_updates == 'true'
        run: |
          jq \
            --arg presenter "${{ steps.check.outputs.latest_presenter }}" \
            --arg keyboard  "${{ steps.check.outputs.latest_keyboard }}" \
            '.["minui-presenter"] = $presenter | .["minui-keyboard"] = $keyboard' \
            bin-versions.json > bin-versions.tmp.json
          mv bin-versions.tmp.json bin-versions.json

      - name: Open Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump upstream bin versions"
          title: "chore: bump upstream bin versions"
          body: |
            Upstream bin updates detected. Review before merging — **merging this PR does not trigger a release.** Push a version tag when you are ready to ship.

            | Binary | Current | Latest |
            |---|---|---|
            | minui-presenter | ${{ steps.check.outputs.current_presenter }} | ${{ steps.check.outputs.latest_presenter }} |
            | minui-keyboard  | ${{ steps.check.outputs.current_keyboard }}  | ${{ steps.check.outputs.latest_keyboard }}  |

            Release notes:
            - [minui-presenter releases](https://github.com/josegonzalez/minui-presenter/releases)
            - [minui-keyboard releases](https://github.com/josegonzalez/minui-keyboard/releases)
          branch: chore/bump-bin-versions
          delete-branch: true
